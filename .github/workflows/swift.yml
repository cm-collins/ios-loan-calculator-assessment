# .github/workflows/swift.yml
# Builds the LoanApplication Xcode project and runs tests on macOS runners

name: Xcode CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare simulator
      run: |
        set -o pipefail
        xcrun simctl shutdown all || true
        xcrun simctl erase all || true

    - name: Select simulator
      run: |
        set -o pipefail
        # Deterministic selection using simctl JSON output and python parsing to avoid shell/awk quoting issues
        SELECTED_NAME=""
        SELECTED_OS=""

        eval "$(xcrun simctl list devices available -j | python3 - <<'PY'
import sys, json
prefs = ["iPhone 14", "iPhone 13", "iPhone 12", "iPhone 11", "iPhone SE (3rd generation)"]
try:
    data = json.load(sys.stdin)
except Exception:
    sys.exit(0)
devices = data.get('devices', {})
# Prefer the ordered list of device names
for pref in prefs:
    for runtime, devs in devices.items():
        for d in devs:
            name = d.get('name')
            avail = d.get('availability', '').lower()
            if name == pref and 'available' in avail:
                print(f"SELECTED_NAME={repr(name)}")
                print(f"SELECTED_OS={repr(runtime)}")
                sys.exit(0)
# Fallback: first available iPhone
for runtime, devs in devices.items():
    for d in devs:
        name = d.get('name')
        avail = d.get('availability', '').lower()
        if name and 'iphone' in name.lower() and 'available' in avail:
            print(f"SELECTED_NAME={repr(name)}")
            print(f"SELECTED_OS={repr(runtime)}")
            sys.exit(0)
# No device found -> print nothing
PY
)"

        if [ -z "$SELECTED_NAME" ]; then
          echo "No available iPhone simulators found" >&2
          exit 1
        fi

        if [ -z "$SELECTED_OS" ]; then
          echo "Warning: could not determine simulator OS runtime; using default DESTINATION without OS"
          echo "DESTINATION=platform=iOS Simulator,name=$SELECTED_NAME" >> $GITHUB_ENV
        else
          echo "DESTINATION=platform=iOS Simulator,name=$SELECTED_NAME,OS=$SELECTED_OS" >> $GITHUB_ENV
        fi

    - name: Build for testing
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
      run: |
        set -o pipefail
        xcodebuild -project LoanApplication.xcodeproj \
          -scheme LoanApplication \
          -destination "$DESTINATION" \
          -derivedDataPath build/derived_data \
          clean build-for-testing \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Run tests
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
      run: |
        set -o pipefail
        xcodebuild -project LoanApplication.xcodeproj \
          -scheme LoanApplication \
          -destination "$DESTINATION" \
          -derivedDataPath build/derived_data \
          test-without-building \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
