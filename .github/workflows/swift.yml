# .github/workflows/swift.yml
# Builds the LoanApplication Xcode project and runs tests on macOS runners

name: Xcode CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare simulator
      run: |
        set -o pipefail
        xcrun simctl shutdown all || true
        xcrun simctl erase all || true

    - name: Select simulator
      run: |
        set -o pipefail
        SELECTED_NAME=""
        SELECTED_OS=""
        for name in "iPhone 14" "iPhone 13" "iPhone 12" "iPhone 11" "iPhone SE (3rd generation)"; do
          if xcrun simctl list devices available | grep -F "$name" >/dev/null 2>&1; then
            SELECTED_NAME="$name"
            SELECTED_OS=$(xcrun simctl list devices available | awk -F'[()]' "/$name/ {gsub(/^[ \t]+|[ \t]+$/,\"\",$2); print $2; exit}")
            break
          fi
        done
        if [ -z "$SELECTED_NAME" ]; then
          SELECTED_NAME=$(xcrun simctl list devices available | awk -F '(' '/iPhone/ {gsub(/^[ \t]+|[ \t]+$/,"",$1); print $1; exit}')
          if [ -n "$SELECTED_NAME" ]; then
            SELECTED_OS=$(xcrun simctl list devices available | awk -F'[()]' "/$SELECTED_NAME/ {gsub(/^[ \t]+|[ \t]+$/,\"\",$2); print $2; exit}")
          fi
        fi
        if [ -z "$SELECTED_NAME" ]; then
          echo "No available iPhone simulators found" >&2
          exit 1
        fi
        if [ -z "$SELECTED_OS" ]; then
          echo "Warning: could not determine simulator OS runtime; using default DESTINATION without OS"
          echo "DESTINATION=platform=iOS Simulator,name=$SELECTED_NAME" >> $GITHUB_ENV
        else
          echo "DESTINATION=platform=iOS Simulator,name=$SELECTED_NAME,OS=$SELECTED_OS" >> $GITHUB_ENV
        fi

    - name: Build for testing
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
      run: |
        set -o pipefail
        xcodebuild -project LoanApplication.xcodeproj \
          -scheme LoanApplication \
          -destination "$DESTINATION" \
          -derivedDataPath build/derived_data \
          clean build-for-testing \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Run tests
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
      run: |
        set -o pipefail
        xcodebuild -project LoanApplication.xcodeproj \
          -scheme LoanApplication \
          -destination "$DESTINATION" \
          -derivedDataPath build/derived_data \
          test-without-building \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
