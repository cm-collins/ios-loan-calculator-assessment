# Builds the LoanApplication Xcode project and runs unit tests on macOS.

name: Xcode CI

on:
  push:
    branches: [main]
    paths:
      - "LoanApplication/**"
      - "LoanApplicationTests/**"
      - "LoanApplication.xcodeproj/**"
      - ".github/workflows/swift.yml"
  pull_request:
    branches: [main]
    paths:
      - "LoanApplication/**"
      - "LoanApplicationTests/**"
      - "LoanApplication.xcodeproj/**"
      - ".github/workflows/swift.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
  DERIVED_DATA_PATH: build/derived_data

jobs:
  test:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Xcode
        run: xcodebuild -version

      - name: Select simulator
        shell: bash
        run: |
          set -euo pipefail

          xcrun simctl shutdown all || true

          SIMULATOR_UDID="$(
            xcrun simctl list devices available --json |
              python3 -c '
          import json
          import sys

          devices_by_runtime = json.load(sys.stdin).get("devices", {})
          preferred_runtimes = [
              "com.apple.CoreSimulator.SimRuntime.iOS-18-5",
          ]
          preferred_names = [
              "iPhone 16",
              "iPhone 16 Pro",
              "iPhone 16e",
              "iPhone SE (3rd generation)",
          ]

          def available_iphones(runtime):
              return [
                  device
                  for device in devices_by_runtime.get(runtime, [])
                  if device.get("isAvailable", True)
                  and device.get("name", "").startswith("iPhone")
                  and device.get("udid")
              ]

          for runtime in preferred_runtimes:
              devices = available_iphones(runtime)
              for name in preferred_names:
                  for device in devices:
                      if device["name"] == name:
                          print(device["udid"])
                          sys.exit(0)

          sys.exit("No available iOS 18.5 iPhone simulator was found")
          '
          )"

          echo "Using simulator: $SIMULATOR_UDID"
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"

      - name: Build unit tests
        run: |
          set -euo pipefail

          xcodebuild \
            -project LoanApplication.xcodeproj \
            -scheme LoanApplication \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -only-testing:LoanApplicationTests \
            -enableCodeCoverage YES \
            clean build-for-testing \
            CODE_SIGNING_ALLOWED=NO

      - name: Run unit tests
        run: |
          set -euo pipefail

          xcodebuild \
            -project LoanApplication.xcodeproj \
            -scheme LoanApplication \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -only-testing:LoanApplicationTests \
            -enableCodeCoverage YES \
            -resultBundlePath build/TestResults.xcresult \
            test-without-building \
            CODE_SIGNING_ALLOWED=NO

      - name: Collect failure diagnostics
        if: failure()
        run: |
          mkdir -p build

          {
            echo "## Xcode"
            xcodebuild -version
            echo
            echo "## Selected simulator"
            xcrun simctl list devices | grep "$SIMULATOR_UDID" || true
            echo
            echo "## Booted simulators"
            xcrun simctl list devices | grep Booted || true
          } | tee build/ci-diagnostics.txt

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ github.run_attempt }}
          path: |
            build/TestResults.xcresult
            build/ci-diagnostics.txt
          if-no-files-found: warn
          retention-days: 7
