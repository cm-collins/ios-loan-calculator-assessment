# .github/workflows/swift.yml
# Builds the LoanApplication Xcode project and runs tests on macOS runners

name: Xcode CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Prepare simulator
      run: |
        set -o pipefail
        xcrun simctl shutdown all || true
        xcrun simctl erase all || true

    - name: Build
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
      run: |
        set -o pipefail
        xcodebuild -project LoanApplication.xcodeproj \
          -scheme LoanApplication \
          -destination 'platform=iOS Simulator,name=iPhone 14' \
          -derivedDataPath build/derived_data \
          clean build \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Run tests
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: "true"
      run: |
        set -o pipefail
        xcodebuild -project LoanApplication.xcodeproj \
          -scheme LoanApplication \
          -destination 'platform=iOS Simulator,name=iPhone 14' \
          -derivedDataPath build/derived_data \
          test \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
